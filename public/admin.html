<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<style>
body { font-family: Arial; background:#0f172a; color:white; padding:20px; }
.btn { padding:10px; border:none; border-radius:6px; cursor:pointer; }
.success { background:green; color:white; }
.warning { background:orange; color:white; }
.danger { background:red; color:white; }
.secondary { background:gray; color:white; }
.row-2 { display:flex; gap:10px; margin-top:10px; }
.actions { display:flex; gap:5px; margin-top:5px; }
input { padding:10px; width:100%; margin-bottom:10px; }
</style>
</head>

<body>

<h2>Hızlı İşlemler</h2>

<input type="text" id="quickKeyValue" placeholder="Key gir...">

<div class="row-2">
  <button class="btn success" onclick="quickExtend1()">+1 Gün</button>
  <button class="btn warning" onclick="quickBan()">HWID Ban</button>
</div>

<div id="quickResult"></div>

<hr>

<h2>Key Listesi</h2>
<div id="keys"></div>

<script>

function getAdminPassword() {
  return "admin123";
}

function setResult(id, data) {
  document.getElementById(id).innerText = JSON.stringify(data);
}

function showToast(msg) {
  alert(msg);
}

async function safeRequest(url, options) {
  try {
    const res = await fetch(url, options);
    return await res.json();
  } catch {
    return { success:false, message:"Sunucu hatası" };
  }
}

async function refreshKeys() {
  const data = await safeRequest("/api/admin/list");
  const container = document.getElementById("keys");
  container.innerHTML = "";

  if (!data || !data.keys) return;

  data.keys.forEach(item => {
    container.innerHTML += `
      <div>
        <b>${item.key}</b>
        <div class="actions">
          <button class="btn secondary" onclick="copyKeyValue('${item.key}')">Kopyala</button>
          <button class="btn success" onclick="extendSpecificKey('${item.key}',1)">+1 Gün</button>
          <button class="btn warning" onclick="banSpecificKey('${item.key}')">Ban</button>
          <button class="btn danger" onclick="deleteSpecificKey('${item.key}')">Sil</button>
        </div>
      </div>
    `;
  });
}

function copyKeyValue(key){
  navigator.clipboard.writeText(key);
  showToast("Kopyalandı");
}

async function extendKeyByValue(key, days, target) {
  const data = await safeRequest("/api/admin/extend", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ adminPassword:getAdminPassword(), key, days })
  });
  if(target) setResult(target,data);
  if(data.success) refreshKeys();
  return data;
}

async function banKeyByValue(key, target=null) {
  const data = await safeRequest("/api/admin/hwid-ban", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ adminPassword:getAdminPassword(), key })
  });
  if(target) setResult(target,data);
  if(data.success) refreshKeys();
  return data;
}

async function deleteSpecificKey(key){
  const data = await safeRequest("/api/admin/delete", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ adminPassword:getAdminPassword(), key })
  });
  if(data.success) refreshKeys();
}

async function extendSpecificKey(key, days){
  await extendKeyByValue(key, days);
}

async function banSpecificKey(key){
  await banKeyByValue(key);
}

async function quickExtend1(){
  const key = document.getElementById("quickKeyValue").value.trim();
  if(!key) return showToast("Key gir");
  const data = await extendKeyByValue(key,1,"quickResult");
  if(data.success) document.getElementById("quickKeyValue").value="";
}

async function quickBan(){
  const key = document.getElementById("quickKeyValue").value.trim();
  if(!key) return showToast("Key gir");
  const data = await banKeyByValue(key,"quickResult");
  if(data.success) document.getElementById("quickKeyValue").value="";
}

refreshKeys();

</script>

</body>
</html>
